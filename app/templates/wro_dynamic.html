{% extends "base.html" %}

{% block title %}{{ page.titulo }} – Club de Robótica{% endblock %}

{% endblock %}

{% block content %}
<div class="lotos-dynamic-page relative overflow-hidden">
    <!-- Fondos decorativos LotOS UI -->
    <div class="absolute inset-0 opacity-10 pointer-events-none">
        <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <defs><pattern id="grid-dynamic" width="60" height="60" patternUnits="userSpaceOnUse">
                <path d="M 60 0 L 0 0 0 60" fill="none" stroke="currentColor" stroke-width="0.5" class="text-brand-500"/>
            </pattern></defs>
            <rect width="100%" height="100%" fill="url(#grid-dynamic)"/>
        </svg>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        {{ page.contenido | safe }}
    </div>
</div>
{% endblock %}
