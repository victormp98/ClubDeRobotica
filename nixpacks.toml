# Nixpacks configuration for Python + Node.js (Tailwind Build)
[providers]
python = {}
node = {}

[phases.setup]
nixPkgs = ["python311", "nodejs", "gcc"]

[phases.install]
cmds = [
    "python -m venv /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
    "npm install"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = ". /opt/venv/bin/activate && flask db upgrade && gunicorn -w 4 -b 0.0.0.0:5000 run:app"
